        <button oncl<!DOCTYPE html>
<html>
<head>
    <title>Music Player</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="player">

    <h2 id="songTitle">Song 1</h2>
    <p id="artist">Artist 1</p>

    <img id="songImage" src="images/img1.jpg" alt="Song Image">

    <audio id="audio"></audio>

    <input type="range" id="progress" value="0">

    <p>
        <span id="currentTime">0:00</span> /
        <span id="duration">0:00</span>
    </p>

    <div class="controls">
        <button onclick="prevSong()">⏮ Previous</button>
        <button onclick="playSong()">▶ Play</button>
        <button oncick="nextSong()">⏭ Next</button>
    </div>

    <br>

    <label>Volume</label>
    <input type="range" id="volume" min="0" max="1" step="0.1" value="1">

    <h3>Playlist</h3>

    <ul>
        <li onclick="loadSong(0)">Song 1</li>
        <li onclick="loadSong(1)">Song 2</li>
        <li onclick="loadSong(2)">Song 3</li>
    </ul>

</div>

<script src="script.js"></script>

</body>
</html>
